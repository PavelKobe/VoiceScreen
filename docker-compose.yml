services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: voicescreen
      POSTGRES_USER: voicescreen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

  worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

  bot:
    build: .
    command: python -m app.bot
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

volumes:
  pgdata:
