# nginx server-блок для веб-кабинета VoiceScreen.
#
# На VM скопировать в /etc/nginx/sites-available/app.voxscreen.ru.conf,
# слинковать в sites-enabled, выпустить TLS через certbot, перезагрузить.
#
# Деплой статики:
#   make web-deploy   (rsync web/dist/ -> /var/www/voxscreen-app/)

server {
    listen 80;
    listen [::]:80;
    server_name app.voxscreen.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.voxscreen.ru;

    ssl_certificate     /etc/letsencrypt/live/app.voxscreen.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.voxscreen.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/voxscreen-app;
    index index.html;

    # SPA fallback: любые роутеры React Router отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кеш для статических ассетов с хешами в имени
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Безопасность
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
